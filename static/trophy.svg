<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">

  <!-- Glow Effect -->
  <circle cx="60" cy="60" r="50" fill="url(#glow)">
    <animate attributeName="r" values="48;52;48" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- Trophy -->
  <path d="M40 25H80V38C80 50 71 60 60 60C49 60 40 50 40 38V25Z"
        fill="#FFD700">
    <animate attributeName="fill" 
             values="#FFD700;#FFEA70;#FFD700" 
             dur="2s" 
             repeatCount="indefinite"/>
  </path>

  <!-- Handles -->
  <path d="M40 30H28C28 45 36 52 45 52"
        stroke="#FFD700"
        stroke-width="6"
        stroke-linecap="round"/>

  <path d="M80 30H92C92 45 84 52 75 52"
        stroke="#FFD700"
        stroke-width="6"
        stroke-linecap="round"/>

  <!-- Stem -->
  <rect x="53" y="60" width="14" height="18" rx="3" fill="#E6B800"/>

  <!-- Base -->
  <rect x="42" y="78" width="36" height="10" rx="3" fill="#C98C00"/>

  <!-- Sparkles -->
  <circle cx="28" cy="22" r="2" fill="white">
    <animate attributeName="opacity"
             values="0;1;0"
             dur="1.5s"
             repeatCount="indefinite"/>
  </circle>

  <circle cx="92" cy="28" r="2" fill="white">
    <animate attributeName="opacity"
             values="0;1;0"
             dur="2s"
             repeatCount="indefinite"/>
  </circle>

  <circle cx="78" cy="15" r="2" fill="white">
    <animate attributeName="opacity"
             values="0;1;0"
             dur="1.8s"
             repeatCount="indefinite"/>
  </circle>

  <!-- Gradient -->
  <defs>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
                    gradientTransform="translate(60 60) rotate(90) scale(60)">
      <stop stop-color="#FFD700" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#FFD700" stop-opacity="0"/>
    </radialGradient>
  </defs>

</svg>
