<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">

  <!-- Animated Background -->
  <rect width="120" height="120" rx="24" fill="url(#bgGradient)">
    <animate attributeName="opacity"
             values="0.95;1;0.95"
             dur="3s"
             repeatCount="indefinite"/>
  </rect>

  <!-- Glow -->
  <circle cx="60" cy="68" r="40" fill="url(#glow)">
    <animate attributeName="r"
             values="38;44;38"
             dur="2.2s"
             repeatCount="indefinite"/>
  </circle>

  <!-- Trophy -->
  <path d="M40 35H80V48C80 60 71 70 60 70C49 70 40 60 40 48V35Z"
        fill="url(#goldGradient)">
    <animate attributeName="fill"
             values="#FFD700;#FFF1A8;#FFD700"
             dur="2s"
             repeatCount="indefinite"/>
  </path>

  <!-- Handles -->
  <path d="M40 40H28C28 55 36 62 45 62"
        stroke="url(#goldGradient)"
        stroke-width="6"
        stroke-linecap="round"/>

  <path d="M80 40H92C92 55 84 62 75 62"
        stroke="url(#goldGradient)"
        stroke-width="6"
        stroke-linecap="round"/>

  <!-- Stem -->
  <rect x="53" y="70" width="14" height="18" rx="3" fill="#E6B800"/>

  <!-- Base -->
  <rect x="42" y="88" width="36" height="12" rx="3" fill="#C98C00"/>

  <!-- Sparkles -->
  <circle cx="20" cy="26" r="2.5" fill="#00E5FF">
    <animate attributeName="opacity"
             values="0;1;0"
             dur="1.3s"
             repeatCount="indefinite"/>
  </circle>

  <circle cx="34" cy="16" r="2" fill="#FF4ECD">
    <animate attributeName="opacity"
             values="0;1;0"
             dur="1.7s"
             repeatCount="indefinite"/>
  </circle>

  <circle cx="52" cy="10" r="2.3" fill="#7C4DFF">
    <animate attributeName="opacity"
             values="0;1;0"
             dur="1.9s"
             repeatCount="indefinite"/>
  </circle>

  <circle cx="70" cy="14" r="2" fill="#00FFA3">
    <animate attributeName="opacity"
             values="0;1;0"
             dur="1.5s"
             repeatCount="indefinite"/>
  </circle>

  <circle cx="88" cy="18" r="2.4" fill="#FFD700">
    <animate attributeName="opacity"
             values="0;1;0"
             dur="2s"
             repeatCount="indefinite"/>
  </circle>

  <circle cx="100" cy="30" r="2.2" fill="#FF6B6B">
    <animate attributeName="opacity"
             values="0;1;0"
             dur="1.6s"
             repeatCount="indefinite"/>
  </circle>

  <!-- Floating Particles -->
  <circle cx="26" cy="42" r="1.5" fill="#00E5FF">
    <animate attributeName="cy"
             values="42;36;42"
             dur="2s"
             repeatCount="indefinite"/>
  </circle>

  <circle cx="94" cy="46" r="1.5" fill="#FF4ECD">
    <animate attributeName="cy"
             values="46;40;46"
             dur="2.4s"
             repeatCount="indefinite"/>
  </circle>

  <!-- Definitions -->
  <defs>

    <!-- Background Gradient -->
    <linearGradient id="bgGradient" x1="0" y1="0" x2="120" y2="120">
      <stop offset="0%" stop-color="#1a1b27"/>
      <stop offset="50%" stop-color="#24283b"/>
      <stop offset="100%" stop-color="#1f2335"/>
    </linearGradient>

    <!-- Gold Gradient -->
    <linearGradient id="goldGradient" x1="40" y1="35" x2="80" y2="90">
      <stop offset="0%" stop-color="#FFF1A8"/>
      <stop offset="50%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#C98C00"/>
    </linearGradient>

    <!-- Glow -->
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
                    gradientTransform="translate(60 68) rotate(90) scale(50)">
      <stop stop-color="#FFD700" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#FFD700" stop-opacity="0"/>
    </radialGradient>

  </defs>

</svg>
